<!-- Analytics KPI Cards Component -->
{# Usage: {% include 'components/analytics_cards.html' %} with kpis context variable #}
<div class="kpi-grid" id="kpi-grid">
    <div class="kpi-card glass-panel fade-in-up" style="--delay: 0.1s">
        <div class="kpi-icon-wrap kpi-icon-blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 00-3-3.87"/>
                <path d="M16 3.13a4 4 0 010 7.75"/>
            </svg>
        </div>
        <div class="kpi-content">
            <span class="kpi-value counter" data-target="{{ kpis.total_applications|default(0) }}">0</span>
            <span class="kpi-label">Total Applications</span>
        </div>
    </div>

    <div class="kpi-card glass-panel fade-in-up" style="--delay: 0.2s">
        <div class="kpi-icon-wrap kpi-icon-red">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        </div>
        <div class="kpi-content">
            <span class="kpi-value counter" data-target="{{ kpis.default_rate|default(0) }}" data-suffix="%">0</span>
            <span class="kpi-label">Default Rate</span>
        </div>
    </div>

    <div class="kpi-card glass-panel fade-in-up" style="--delay: 0.3s">
        <div class="kpi-icon-wrap kpi-icon-green">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="1" x2="12" y2="23"/>
                <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
            </svg>
        </div>
        <div class="kpi-content">
            <span class="kpi-value counter" data-target="{{ kpis.avg_income|default(0)|int }}" data-prefix="₹" data-format="compact">0</span>
            <span class="kpi-label">Avg. Annual Income</span>
        </div>
    </div>

    <div class="kpi-card glass-panel fade-in-up" style="--delay: 0.4s">
        <div class="kpi-icon-wrap kpi-icon-purple">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
            </svg>
        </div>
        <div class="kpi-content">
            <span class="kpi-value counter" data-target="{{ kpis.avg_loan|default(0)|int }}" data-prefix="₹" data-format="compact">0</span>
            <span class="kpi-label">Avg. Loan Amount</span>
        </div>
    </div>
</div>
