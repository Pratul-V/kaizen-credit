<!-- Risk Gauge Component -->
{# Usage: {% include 'components/risk_gauge.html' %} with result context variable #}
<div class="risk-gauge-container" id="risk-gauge-container">
    <canvas id="risk-gauge-canvas" width="220" height="220"></canvas>
    <div class="gauge-center-text">
        <span class="gauge-value" id="gauge-value">0</span>
        <span class="gauge-unit">%</span>
        <span class="gauge-label" id="gauge-label">Default Risk</span>
    </div>
</div>
